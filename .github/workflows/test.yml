name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install phase-loop-runtime + pytest
        # No test extra is defined in pyproject; install the package + pytest.
        run: python -m pip install ./phase-loop-runtime pytest

      - name: Run standalone test suite
        # conftest.py lives under phase-loop-runtime/tests and skips
        # dotfiles_integration-marked tests when no fleet tree is present.
        working-directory: phase-loop-runtime
        run: python -m pytest -m "not dotfiles_integration"

  cleanroom:
    name: clean-room (standalone-from-wheel, Gate A)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build + pytest
        run: python -m pip install build pytest

      - name: Gate A — standalone-from-wheel clean room
        # Builds the wheel, installs it into an isolated venv, and runs the FULL
        # standalone suite (TESTDECOUPLE). Skills-bundle tests skip when the sibling
        # phase-loop-skills/ is absent (#9); the runtime must resolve only under
        # site-packages, never a dotfiles checkout.
        working-directory: phase-loop-runtime
        run: bash scripts/gate_a_cleanroom.sh
