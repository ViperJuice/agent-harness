name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install phase-loop-runtime + pytest
        # No test extra is defined in pyproject; install the package + pytest.
        run: python -m pip install ./phase-loop-runtime pytest

      - name: Run standalone test suite
        # conftest.py lives under phase-loop-runtime/tests and skips
        # dotfiles_integration-marked tests when no fleet tree is present.
        working-directory: phase-loop-runtime
        run: python -m pytest -m "not dotfiles_integration"

  # NOTE: a `cleanroom` job running scripts/gate_a_cleanroom.sh (wheel build +
  # isolated-venv install + full standalone suite) is intentionally NOT wired up
  # yet. As of v0.1.4 the rigor-v1 tests (test_execute_phase_handoff_mode.py and
  # the doc-lane tests) read phase-loop-skills/**/SKILL.md from the SIBLING
  # package, which breaks the TESTDECOUPLE standalone-from-wheel invariant the
  # clean-room enforces (FileNotFoundError on the skills path). The from-source
  # pytest matrix above already covers the runtime tests. Re-add the clean-room
  # job once those tests are marked integration or resolve skills via package-data.
  # Tracked in the agent-harness issue tracker.
