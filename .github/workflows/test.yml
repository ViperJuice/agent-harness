name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install phase-loop-runtime + pytest
        # No test extra is defined in pyproject; install the package + pytest.
        run: python -m pip install ./phase-loop-runtime pytest

      - name: Guard — no scattered/duplicated hardcoded model IDs
        # Enforces the "reference the central constant, don't inline the model ID"
        # convention (model-id-source hybrid: registry allowlist + per-line marker).
        # Pure stdlib; fails the build on any unsanctioned concrete model-ID pin.
        working-directory: phase-loop-runtime
        run: python3 scripts/check_model_id_sources.py

      - name: Run standalone test suite
        # conftest.py lives under phase-loop-runtime/tests and skips
        # dotfiles_integration-marked tests when no fleet tree is present.
        working-directory: phase-loop-runtime
        run: python -m pytest -m "not dotfiles_integration"

      - name: WIRE-THE-DOCTOR — fail on a stale gating BOM target
        # A drift detector nobody invokes re-rots on day 1 (IF-0-AHADOPT-2). This
        # runs the INSTALLED `phase-loop doctor` against the live npm+PyPI
        # registries and fails the build if a GATING (repo-owned) BOM target is
        # stale — the auto-track install pin or the consiliency-contract floor.
        # It degrades to `unknown` (never fails) when a registry is unreachable,
        # so a network blip cannot red the build; only definitive drift gates.
        run: phase-loop doctor --fail-on-stale

  cleanroom:
    name: clean-room (standalone-from-wheel, Gate A)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build + pytest
        run: python -m pip install build pytest

      - name: Gate A — standalone-from-wheel clean room
        # Builds the wheel, installs it into an isolated venv, and runs the FULL
        # standalone suite (TESTDECOUPLE). Skills-bundle tests skip when the sibling
        # phase-loop-skills/ is absent (#9); the runtime must resolve only under
        # site-packages, never a dotfiles checkout.
        working-directory: phase-loop-runtime
        run: bash scripts/gate_a_cleanroom.sh
