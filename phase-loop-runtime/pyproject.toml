[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "phase-loop-runtime"
version = "0.1.0"
description = "Vendored phase-loop runtime and CLI for dotfiles phase workflows"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Private" }
dependencies = [
    "baml-py>=0.222,<0.223",
    "pydantic>=2,<3",
]

[project.scripts]
phase-loop = "phase_loop_runtime.cli:main"
codex-phase-loop = "phase_loop_runtime.cli:main"

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
phase_loop_runtime = ["py.typed"]

[tool.setuptools.data-files]
"share/phase-loop-runtime/protocol" = ["protocol/protocol.md"]
"share/phase-loop-runtime/baml_src" = [
    "baml_src/emit_phase_closeout.baml",
    "baml_src/dotfiles_adoption_manifest.baml",
    "baml_src/dotfiles_runtime_projection.baml",
    "baml_src/dotfiles_plan_manifest.baml",
    "baml_src/dotfiles_c4_document.baml",
    "baml_src/dotfiles_task_catalog.baml",
    "baml_src/evaluate_suspected_fake_evidence.baml",
]
